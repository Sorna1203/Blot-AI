<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blot.Ai ChatBot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-100 flex justify-center items-center h-screen overflow-hidden">

    <div id="splash-screen">
        <h1 class="vibrant-text">Blot.Ai</h1>
    </div>

    <div id="main-container" style="display: none;" class="w-full max-w-md bg-white dark:bg-gray-900 rounded-2xl shadow-lg flex flex-col p-4 h-[90vh]">
        <div class="flex justify-between items-center mb-4">
            <h1 class="text-2xl font-bold text-gray-800 dark:text-white">Blot.Ai</h1>
            <button id="toggleTheme" class="px-2 py-1 bg-gray-200 dark:bg-gray-700 rounded">🌙</button>
        </div>

        <div id="chat" class="flex-1 overflow-y-auto p-2 space-y-2 border rounded-lg bg-gray-50 dark:bg-gray-800 flex flex-col"></div>

        <div class="flex mt-2">
            <input id="message" type="text" placeholder="Type a message..." 
                   class="flex-1 border rounded-l-lg px-3 py-2 focus:outline-none dark:bg-gray-700 dark:text-white" autofocus>
            <button onclick="sendMessage()" class="bg-blue-500 text-white px-4 rounded-r-lg hover:bg-blue-600">Send</button>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
